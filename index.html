<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบรายงานกิจกรรมโรงเรียนจอมทอง</title>

  <!-- favicon กิจกรรมโรงเรียน (calendar-check) -->
  <link rel="icon" type="image/svg+xml"
        href="https://api.iconify.design/mdi/calendar-check.svg">

  <style>
    html, body { height: 100%; margin: 0; }
    object#app {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: 0; overflow: hidden;
    }
    noscript {
      display: block; padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    }
  </style>
</head>

<body>
  <!-- ฝังเว็บแอปด้วย <object> -->
  <object
    id="app"
    type="text/html"
    data="https://script.google.com/macros/s/AKfycbzXYfxGtU9Bj0pBYo8Hz4zXL9RK35b3jNLuI6hd_8g0LeUyi9HmpNXTHZv2gCuzj2_p/exec?embed=1">
  </object>

  <noscript>กรุณาเปิดใช้งาน JavaScript เพื่อใช้งานระบบรายงานกิจกรรมโรงเรียน</noscript>
</body>
</html>
