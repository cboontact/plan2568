  <style>
    body { margin: 0; font-family: 'Noto Sans Thai', system-ui, sans-serif; }
    #loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: #f0f9ff; transition: opacity .4s; z-index: 10;
    }
    #loader img { width: 72px; height: 72px; }
    #loader p { color: #0369a1; font-size: 15px; margin: 0; }
    #loader.hide { opacity: 0; pointer-events: none; }
    object { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <div id="loader">
    <img src="https://img2.pic.in.th/pic/LOGOChomthong0be381c1c5760248.png" alt="โรงเรียนจอมทอง">
